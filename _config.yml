title: Salik Tehami
description: A casebook for healthcare organizations, AI systems, data work, and operational judgment.
author: Salik Tehami
email:
url: "https://saliktehami.com"
canonical_url: "https://saliktehami.com"

exclude:
  - ".rvmrc"
  - ".rbenv-version"
  - "README.md"
  - "Rakefile"
  - "LICENSE"
  - "Gemfile"
  - "Gemfile.lock"
  - "vendor"
  - ".bundle"
  - "_reference"
  - "docker-compose.yaml"
  - "mdconvert.sh"
  - "prng.py"

nav:
  - text: Start Here
    url: /#start-here
  - text: Cases
    url: /cases/
  - text: Concepts
    url: /concepts/
  - text: Reviews
    url: /reviews/
  - text: Tools
    url: /tools/
  - text: Reading
    url: /reading/
  - text: About
    url: /about/

markdown: kramdown
plugins:
  - jekyll-sitemap

permalink: /writing/:year/:month/:day/:title/
excerpt_separator: <!--more-->

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
