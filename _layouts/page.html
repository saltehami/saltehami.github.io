---
layout: default
---
<article class="page-shell">
  <header class="page-header site-frame">
    <p class="eyebrow">{{ page.kicker | default: "Page" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="site-frame page-body">
    {{ content }}
  </div>
</article>
